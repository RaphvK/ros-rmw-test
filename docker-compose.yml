services:

  zenoh-router:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - RMW_IMPLEMENTATION=rmw_zenoh_cpp
      - ZENOH_ROUTER_CONFIG_URI=/workspaces/src/rmw_config/DEFAULT_RMW_ZENOH_ROUTER_CONFIG.json5
    volumes:
      - ./rmw_config:/workspaces/src/rmw_config
    command: /bin/bash -ic "source /ws/install/setup.bash && ros2 run rmw_zenoh_cpp rmw_zenohd"

  test-publisher:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - RMW_IMPLEMENTATION=rmw_zenoh_cpp
      - ZENOH_SESSION_CONFIG_URI=/workspaces/src/rmw_config/DEFAULT_RMW_ZENOH_SESSION_CONFIG.json5
      - ROS_DOMAIN_ID=5
    volumes:
      - ./trace/test-publisher:/root/.ros/tracing
      - ./rmw_config:/workspaces/src/rmw_config
    command: /bin/bash -ic "tshark -i eth0 -w /root/.ros/tracing/test-publisher.pcap -a duration:5 & source /ws/install/setup.bash && ros2 launch test_publisher test_publisher_launch.py duration:=1000 test_subscriber_1:=false test_subscriber_2:=false"

  test-subscriber:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - RMW_IMPLEMENTATION=rmw_zenoh_cpp
      - ZENOH_SESSION_CONFIG_URI=/workspaces/src/rmw_config/DEFAULT_RMW_ZENOH_SESSION_CONFIG.json5
      - ROS_DOMAIN_ID=5
    volumes:
      - ./trace/test-subscriber:/root/.ros/tracing
      - ./rmw_config:/workspaces/src/rmw_config
    command: /bin/bash -ic "tshark -i eth0 -w /root/.ros/tracing/test-subscriber.pcap -a duration:5 & source /ws/install/setup.bash && ros2 launch test_publisher test_publisher_launch.py duration:=1000 dummy_publisher:=false test_subscriber_2:=false"
